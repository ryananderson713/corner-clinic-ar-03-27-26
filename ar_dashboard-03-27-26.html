<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; font-size: 14px; }
  
  /* Header */
  .header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .subtitle { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .badge { background: #e74c3c; color: white; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }

  /* Breadcrumb */
  .breadcrumb { background: white; border-bottom: 1px solid #e8eaed; padding: 10px 24px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
  .breadcrumb span { cursor: pointer; color: #2563eb; }
  .breadcrumb span:hover { text-decoration: underline; }
  .breadcrumb .sep { color: #ccc; }
  .breadcrumb .current { color: #1a1a2e; font-weight: 500; cursor: default; }

  /* Metric cards */
  .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 16px 24px; }
  .metric { background: white; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8eaed; cursor: pointer; transition: all 0.15s; }
  .metric:hover { border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,0.12); }
  .metric.active { border-color: #2563eb; background: #eff6ff; }
  .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 700; }
  .metric-sub { font-size: 11px; color: #888; margin-top: 3px; }
  .c-blue { color: #2563eb; } .c-amber { color: #d97706; } .c-orange { color: #ea580c; }
  .c-red { color: #dc2626; } .c-danger { color: #991b1b; } .c-green { color: #16a34a; }

  /* Main layout */
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 16px; }
  .panel { background: white; border-radius: 10px; border: 1px solid #e8eaed; overflow: hidden; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 13px; font-weight: 600; color: #1a1a2e; }
  .panel-body { padding: 16px; }

  /* Chart container */
  .chart-wrap { position: relative; height: 300px; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: #f8f9fb; padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #888; border-bottom: 1px solid #e8eaed; position: sticky; top: 0; }
  .data-table th.right { text-align: right; }
  .data-table td { padding: 8px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .data-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table tr:hover { background: #f8f9ff; cursor: pointer; }
  .data-table tr:last-child td { border-bottom: none; }
  .table-wrap { max-height: 320px; overflow-y: auto; }

  /* Bucket pills */
  .pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
  .pill-current { background: #dbeafe; color: #1d4ed8; }
  .pill-30 { background: #fef3c7; color: #92400e; }
  .pill-60 { background: #ffedd5; color: #9a3412; }
  .pill-90 { background: #fee2e2; color: #991b1b; }
  .pill-120 { background: #7f1d1d; color: white; }

  /* Aging bar */
  .aging-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; width: 80px; }

  /* View toggle */
  .view-bar { padding: 0 24px 12px; display: flex; align-items: center; gap: 12px; }
  .view-btn { font-size: 12px; padding: 5px 14px; border-radius: 6px; border: 1px solid #e8eaed; background: white; cursor: pointer; font-weight: 500; color: #555; transition: all 0.15s; }
  .view-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .search { flex: 1; max-width: 280px; padding: 5px 12px; border: 1px solid #e8eaed; border-radius: 6px; font-size: 12px; outline: none; }
  .search:focus { border-color: #2563eb; }

  /* Not billed alert */
  .alert { margin: 0 24px 12px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #991b1b; display: flex; align-items: center; gap: 8px; }
  .alert strong { font-weight: 700; }

  /* Patient detail panel */
  .detail-header { background: #1a1a2e; color: white; padding: 16px 24px; }
  .detail-header h2 { font-size: 16px; font-weight: 600; }
  .detail-header .meta { font-size: 12px; opacity: 0.6; margin-top: 4px; }
  .back-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-right: 12px; }
  .back-btn:hover { background: rgba(255,255,255,0.25); }

  /* Full width panel */
  .full { grid-column: 1 / -1; }
  
  /* Filter row */
  .filter-row { display: flex; gap: 8px; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid #e8eaed; background: white; cursor: pointer; font-weight: 500; color: #555; transition: all 0.12s; white-space: nowrap; }
  .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
  .filter-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .filter-label { font-size: 11px; color: #888; font-weight: 600; }

  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }
  .sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .sortable:hover { color: #2563eb; }
  .sort-arrow { font-size: 10px; margin-left: 3px; opacity: 0.5; }
  .sort-arrow.active { opacity: 1; color: #2563eb; }
  .date-filter { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; background: #fafafa; flex-wrap: wrap; }
  .date-filter label { font-size: 11px; font-weight: 600; color: #888; }
  .date-filter input[type=date] { font-size: 12px; padding: 4px 8px; border: 1px solid #e8eaed; border-radius: 6px; outline: none; }
  .date-filter input[type=date]:focus { border-color: #2563eb; }
  .clear-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #e8eaed; background: white; cursor: pointer; color: #666; }
  .clear-btn:hover { background: #f8f9ff; border-color: #2563eb; color: #2563eb; }
</style>

function sortArrow(col) {
  if (sortCol !== col) return '<span class="sort-arrow">↕</span>';
  return `<span class="sort-arrow active">${sortDir==='asc'?'↑':'↓'}</span>`;
}

function patSortArrow(col) {
  if (patSortCol !== col) return '<span class="sort-arrow">↕</span>';
  return `<span class="sort-arrow active">${patSortDir==='asc'?'↑':'↓'}</span>`;
}

function setSort(col) {
  if (sortCol === col) { sortDir = sortDir==='asc'?'desc':'asc'; }
  else { sortCol = col; sortDir = 'desc'; }
  document.getElementById('carrierTableBody').innerHTML = renderCarrierRows(searchTerm);
}

function setPatSort(col) {
  if (patSortCol === col) { patSortDir = patSortDir==='asc'?'desc':'asc'; }
  else { patSortCol = col; patSortDir = 'desc'; }
  render();
}

function renderCarrierRows(filter='') {
  let rows = RAW.filter(c => !filter || c.name.toLowerCase().includes(filter.toLowerCase()));
  // Sort
  rows = [...rows].sort((a,b) => {
    let va = sortCol==='name' ? a.name : (a[sortCol]||0);
    let vb = sortCol==='name' ? b.name : (b[sortCol]||0);
    if (typeof va === 'string') return sortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir==='asc' ? va-vb : vb-va;
  });
  return rows.map(c => {
      const barW = (v) => Math.round(v/c.total*100);
      const flag = c.name === 'NOT BILLED YET' ? ' 🚨' : c.d120 > 2000 ? ' ⚠' : '';
      return `<tr onclick="drillCarrier('${c.name.replace(/'/g,"\\'")}')" style="${c.name==='NOT BILLED YET'?'background:#fff5f5;':''}">
        <td><strong>${c.name}${flag}</strong><div style="font-size:10px;color:#aaa">${c.patients.length} visits</div></td>
        <td class="right" style="color:#2563eb">${c.current>0?fmtK(c.current):'—'}</td>
        <td class="right" style="color:#d97706">${c.d30>0?fmtK(c.d30):'—'}</td>
        <td class="right" style="color:#ea580c">${c.d60>0?fmtK(c.d60):'—'}</td>
        <td class="right" style="color:#dc2626">${c.d90>0?fmtK(c.d90):'—'}</td>
        <td class="right" style="color:#7f1d1d;font-weight:${c.d120>1000?'700':'400'}">${c.d120>0?fmtK(c.d120):'—'}</td>
        <td class="right"><strong>${fmtK(c.total)}</strong></td>
        <td>
          <div class="aging-bar">
            <div style="width:${barW(c.current)}%;background:#3b82f6"></div>
            <div style="width:${barW(c.d30)}%;background:#f59e0b"></div>
            <div style="width:${barW(c.d60)}%;background:#f97316"></div>
            <div style="width:${barW(c.d90)}%;background:#ef4444"></div>
            <div style="width:${barW(c.d120)}%;background:#7f1d1d"></div>
          </div>
        </td>
      </tr>`;
    }).join('');
}

function renderCarrierView() {
  const c = RAW.find(x => x.name === selectedCarrier);
  if (!c) return '';

  let patients = c.patients;
  if (bucketFilter !== 'all') {
    const bMap = {'current':'Current','30':'30','60':'60','90':'90','120':'120+'};
    patients = patients.filter(p => p.bucket === bMap[bucketFilter]);
  }
  if (searchTerm) patients = patients.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
  // Date filter
  if (dateFrom) patients = patients.filter(p => {
    const parts = p.svc_date.split('/'); // MM/DD/YYYY
    const d = parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
    return d >= dateFrom;
  });
  if (dateTo) patients = patients.filter(p => {
    const parts = p.svc_date.split('/');
    const d = parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
    return d <= dateTo;
  });

    let va = patSortCol==='name' ? a.name : patSortCol==='svc_date' ? a.svc_date : (a[patSortCol]||0);

        // Convert MM/DD/YYYY to sortable
        const toISO = s => { const p=s.split('/'); return p[2]+p[0].padStart(2,'0')+p[1].padStart(2,'0'); };
        return patSortDir==='asc' ? toISO(va).localeCompare(toISO(vb)) : toISO(vb).localeCompare(toISO(va));
      }
      return patSortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return patSortDir==='asc' ? va-vb : vb-va;
  });

  const bucketCounts = {'Current':0,'30':0,'60':0,'90':0,'120+':0};
  c.patients.forEach(p => { bucketCounts[p.bucket] = (bucketCounts[p.bucket]||0)+1; });

    <div class="metric"><div class="metric-label">Over 30</div><div class="metric-value c-amber">${fmt(c.d30)}</div></div>

    <div class="metric" style="border-color:#dc2626;background:#fff5f5"><div class="metric-label" style="color:#dc2626">Over 120</div><div class="metric-value c-danger">${fmt(c.d120)}</div></div>

        <input class="search" id="patSearch" placeholder="Search patient name..." value="${searchTerm}">
      </div>
      <div class="date-filter">
        <label>Service date:</label>
        <input type="date" id="dateFrom" value="${dateFrom}" onchange="setDateFrom(this.value)" placeholder="From">
        <span style="font-size:11px;color:#888">to</span>
        <input type="date" id="dateTo" value="${dateTo}" onchange="setDateTo(this.value)" placeholder="To">
        ${(dateFrom||dateTo)?`<button class="clear-btn" onclick="clearDates()">✕ Clear dates</button>`:''}
        ${(dateFrom||dateTo)?`<span style="font-size:11px;color:#2563eb;font-weight:500">Filtered</span>`:''}
      </div>
      <div class="filter-row">
        <span class="filter-label">Bucket:</span>
        ${['all','current','30','60','90','120'].map(b => `<button class="filter-btn ${bucketFilter===b?'active':''}" onclick="setBucket('${b}')">${b==='all'?'All buckets':b==='current'?'Current':'Over '+b}</button>`).join('')}
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th class="sortable" onclick="setPatSort('name')">Patient ${patSortArrow('name')}</th>
            <th>Chart #</th>
            <th class="sortable" onclick="setPatSort('svc_date')">Service Date ${patSortArrow('svc_date')}</th>
            <th>CPT</th><th>Provider</th>
            <th class="right sortable" onclick="setPatSort('current')">Current ${patSortArrow('current')}</th>
            <th class="right sortable" onclick="setPatSort('d30')">30d ${patSortArrow('d30')}</th>
            <th class="right sortable" onclick="setPatSort('d60')">60d ${patSortArrow('d60')}</th>
            <th class="right sortable" onclick="setPatSort('d90')">90d ${patSortArrow('d90')}</th>
            <th class="right sortable" onclick="setPatSort('d120')">120+ ${patSortArrow('d120')}</th>
            <th class="right sortable" onclick="setPatSort('total')">Total ${patSortArrow('total')}</th>
            <th>Bucket</th>
          </tr></thead>
          <tbody>
            ${patients.map(p => `
            <tr onclick="drillPatient('${p.chart}','${c.name.replace(/'/g,"\\'")}')" >
              <td><strong>${p.name || '—'}</strong></td>
              <td style="color:#888">#${p.chart}</td>
              <td style="color:#888">${p.svc_date}</td>
              <td style="font-family:monospace;color:#555">${p.cpt||'—'}</td>
              <td style="color:#555;font-size:11px">${p.provider||'—'}</td>
              <td class="right" style="color:#2563eb">${p.current>0?fmt(p.current):'—'}</td>
              <td class="right" style="color:#d97706">${p.d30>0?fmt(p.d30):'—'}</td>
              <td class="right" style="color:#ea580c">${p.d60>0?fmt(p.d60):'—'}</td>
              <td class="right" style="color:#dc2626">${p.d90>0?fmt(p.d90):'—'}</td>
              <td class="right" style="color:#7f1d1d;font-weight:${p.d120>0?'700':'400'}">${p.d120>0?fmt(p.d120):'—'}</td>
              <td class="right"><strong>${fmt(p.total)}</strong></td>
              <td><span class="pill pill-${pillClass(p.bucket)}">${p.bucket}</span></td>
            </tr>`).join('') || '<tr><td colspan="12" class="empty">No patients match this filter</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function renderPatientView() {
  const c = RAW.find(x => x.name === selectedCarrier);
  const p = c?.patients.find(x => x.chart === selectedPatient);
  if (!c || !p) return '';

  return `
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="back-btn" onclick="goCarrier()"  >← Back</button>
      <div><div style="font-size:16px;font-weight:700;color:white">${p.name || 'Patient #'+p.chart}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px">Chart #${p.chart} &nbsp;·&nbsp; ${c.name}</div></div>
    </div>
    <div style="text-align:right;color:white">
      <div style="font-size:11px;opacity:0.5;margin-bottom:4px">Balance Due</div>
      <div style="font-size:24px;font-weight:700">${fmt(p.total)}</div>
    </div>
  </div>
  <div class="breadcrumb">
    <span onclick="goOverview()">All Carriers</span><span class="sep">›</span>
    <span onclick="goCarrier()">${c.name}</span><span class="sep">›</span>
    <span class="current">${p.name || 'Chart #'+p.chart}</span>
  </div>

  <div style="padding:16px 24px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Visit information</span></div>
        <div class="panel-body">
          <table style="width:100%;font-size:13px;border-collapse:collapse">
            ${[
              ['Service Date', p.svc_date],
              ['Visit ID', p.visit_id || '—'],
              ['CPT Code', p.cpt || '—'],
              ['Provider', p.provider || '—'],
              ['Carrier', c.name],
              ['Chart #', '#'+p.chart],
              ['Aging Bucket', p.bucket],
            ].map(([l,v]) => `<tr><td style="padding:8px 0;color:#888;width:40%">${l}</td><td style="padding:8px 0;font-weight:500">${v}</td></tr>`).join('')}
          </table>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Balance breakdown</span></div>
        <div class="panel-body">
          <div class="chart-wrap" style="height:220px"><canvas id="patientChart"></canvas></div>
          <table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:12px">
            ${[
              ['Current','#2563eb',p.current],['30 Days','#d97706',p.d30],
              ['60 Days','#ea580c',p.d60],['90 Days','#dc2626',p.d90],
              ['120+ Days','#7f1d1d',p.d120]
            ].map(([l,clr,v]) => v>0?`<tr><td style="padding:5px 0;color:#888">${l}</td><td style="padding:5px 0;text-align:right;font-weight:700;color:${clr}">${fmt(v)}</td></tr>`:'').join('')}
            <tr style="border-top:1px solid #e8eaed"><td style="padding:8px 0;font-weight:700">Total</td><td style="padding:8px 0;text-align:right;font-weight:700;font-size:16px">${fmt(p.total)}</td></tr>
          </table>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:16px">
      <div class="panel-header"><span class="panel-title">Recommended action</span></div>
      <div class="panel-body">
        ${p.d120>0 ? `<div style="background:#fff5f5;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;color:#991b1b;font-size:13px"><strong>🚨 Over 120 days — Immediate action required.</strong> This claim is beyond 4 months. Check payer timely filing limits immediately. If still within window, resubmit or appeal. If outside window, consider write-off or secondary billing.</div>` :
          p.d90>0 ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;color:#991b1b;font-size:13px"><strong>⚠ Over 90 days.</strong> Follow up with ${c.name} on claim status. Request ETA on payment or denial reason if not yet adjudicated.</div>` :
          p.d60>0 ? `<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px 16px;color:#9a3412;font-size:13px"><strong>Over 60 days.</strong> Send a second follow-up to ${c.name}. Confirm claim was received and is in process.</div>` :
          p.d30>0 ? `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;color:#92400e;font-size:13px"><strong>Over 30 days.</strong> Standard follow-up. Confirm claim was received by ${c.name} and check adjudication status.</div>` :
          `<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;color:#166534;font-size:13px"><strong>Current.</strong> Claim is within normal processing window. No action needed yet.</div>`
        }
      </div>
    </div>
  </div>`;
}

function renderCharts() {
  if (view === 'overview') {
    // Donut
    const ctx1 = document.getElementById('donutChart');
    if (ctx1) {
      if (chart) chart.destroy();
      chart = new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: BUCKET_LABELS,
          datasets: [{ data: [GT.current,GT.d30,GT.d60,GT.d90,GT.d120],
            backgroundColor: Object.values(BUCKET_COLORS), borderWidth: 2, borderColor: '#fff' }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{size:11}, padding:12 } } } }
      });
    }
    // Bar - top 10
    const ctx2 = document.getElementById('barChart');
    if (ctx2) {
      const top10 = RAW.slice(0,10);
      new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: top10.map(c => c.name.length > 18 ? c.name.substring(0,18)+'…' : c.name),
          datasets: BUCKET_KEYS.map((k,i) => ({
            label: BUCKET_LABELS[i],
            data: top10.map(c => c[k]),
            backgroundColor: Object.values(BUCKET_COLORS)[i],
            borderRadius: i===4 ? {topLeft:4,topRight:4} : 0
          }))
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          scales:{ x:{ stacked:true, ticks:{font:{size:10}} }, y:{ stacked:true, ticks:{ callback: v => '$'+v.toLocaleString() } } },
          plugins:{ legend:{ display:false } }
        }
      });
    }
  } else if (view === 'carrier') {
    const c = RAW.find(x => x.name === selectedCarrier);
    if (!c) return;
    const ctx1 = document.getElementById('carrierDonut');
    if (ctx1) {
      new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: BUCKET_LABELS,
          datasets: [{ data: BUCKET_KEYS.map(k=>c[k]),
            backgroundColor: Object.values(BUCKET_COLORS), borderWidth:2, borderColor:'#fff' }]
        },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{font:{size:11},padding:10} } } }
      });
    }
    const ctx2 = document.getElementById('carrierBar');
    if (ctx2) {
      const bucketCounts = {'Current':0,'30':0,'60':0,'90':0,'120+':0};
      c.patients.forEach(p => { bucketCounts[p.bucket]=(bucketCounts[p.bucket]||0)+1; });
      new Chart(ctx2, {
        type:'bar',
        data:{
          labels:['Current','30 Days','60 Days','90 Days','120+ Days'],
          datasets:[{ data:Object.values(bucketCounts),
            backgroundColor:Object.values(BUCKET_COLORS), borderRadius:4 }]
        },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{ y:{ ticks:{ callback:v=>v+' visits' } } } }
      });
    }
  } else if (view === 'patient') {
    const c = RAW.find(x => x.name === selectedCarrier);
    const p = c?.patients.find(x => x.chart === selectedPatient);
    if (!p) return;
    const ctx = document.getElementById('patientChart');
    if (ctx) {
      new Chart(ctx, {
        type:'bar',
        data:{
          labels:BUCKET_LABELS,
          datasets:[{ data:BUCKET_KEYS.map(k=>p[k]),
            backgroundColor:Object.values(BUCKET_COLORS), borderRadius:4 }]
        },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{ y:{ ticks:{ callback:v=>'$'+v } } } }
      });
    }
  }
}

function attachEvents() {
  const cs = document.getElementById('carrierSearch');
  if (cs) cs.addEventListener('input', e => { searchTerm=e.target.value; document.getElementById('carrierTableBody').innerHTML=renderCarrierRows(searchTerm); });
  const ps = document.getElementById('patSearch');
  if (ps) ps.addEventListener('input', e => { searchTerm=e.target.value; render(); });
}

function setDateFrom(v) { dateFrom=v; render(); }
function setDateTo(v) { dateTo=v; render(); }
function clearDates() { dateFrom=''; dateTo=''; render(); }

function drillCarrier(name) { selectedCarrier=name; view='carrier'; bucketFilter='all'; searchTerm=''; render(); }
function drillPatient(chart, carrier) { selectedCarrier=carrier; selectedPatient=chart; view='patient'; render(); }
function goOverview() { view='overview'; selectedCarrier=null; selectedPatient=null; bucketFilter='all'; searchTerm=''; render(); }
function goCarrier() { view='carrier'; selectedPatient=null; patSortCol='total'; patSortDir='desc'; render(); }
function setBucket(b) { bucketFilter=b; render(); }

render();
</script>
</body>
</html>
